# Render Blueprint — AI Construction Planner
# ────────────────────────────────────────────────────────────────────────────
# ONE Node Web Service runs server.js, which:
#   • serves the built frontend (dist/)
#   • proxies POST /api/analyze → Anthropic (keeps ANTHROPIC_API_KEY server-side)
#   • serves /api/auth, /api/billing, /api/erp (material prices + TPSO reference)
#
# ⚠️ Must be a **Web Service** (Node), NOT a Static Site — a Static Site can't run
# server.js, so /api/* won't work and analysis fails.
#
# Deploy: Render → New + → Blueprint → pick this repo → Apply
# (or create the Web Service manually with the same build/start commands).
#
# Secrets use sync:false → set real values in the Render dashboard (never commit).
# ────────────────────────────────────────────────────────────────────────────

services:
  - type: web
    name: ai-construction-planner
    runtime: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start # = node server.js (serves dist/ + /api/*)
    autoDeploy: true
    envVars:
      - key: ANTHROPIC_API_KEY # จำเป็น — /api/analyze (⚠️ ไม่มี VITE_ นำหน้า, อยู่ฝั่ง server)
        sync: false
      - key: APP_URL # (billing) URL เว็บจริง เช่น https://<service>.onrender.com
        sync: false
      - key: OMISE_SECRET_KEY # (billing) คีย์ลับ Omise — ไม่ใส่ = ปิด checkout
        sync: false
      # Default admin — auto-created every boot (file store ถูกล้างทุก deploy).
      # ตั้ง 2 ตัวนี้เพื่อ login ด้วยรหัสของคุณเอง (คงอยู่ถาวรข้าม deploy)
      - key: DEFAULT_ADMIN_EMAIL # ไม่ตั้ง = nhanswat869@gmail.com
        sync: false
      - key: DEFAULT_ADMIN_PASSWORD # ไม่ตั้ง = test1234 (อย่างน้อย 8 ตัวอักษร)
        sync: false
